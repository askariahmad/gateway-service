server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: config-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/config/**
        - id: log-collector-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/collector/**
        - id: log-analyzer-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/analyzer/**
        - id: repo-scanner-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/scanner/**
        - id: incident-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/incidents/**

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 1 day

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
